[build]
builder = "NIXPACKS"
# Migrate at build time while full node_modules (incl. prisma CLI) exists.
buildCommand = "npm ci && npx prisma generate && npx prisma migrate deploy && npx next build"

[deploy]
startCommand = "npx next start --hostname 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
